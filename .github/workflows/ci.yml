# =============================================================================
# TP4 — GitHub Actions CI/CD Pipeline
# =============================================================================
#
# COMMENT FONCTIONNE GITHUB ACTIONS ?
# ------------------------------------
# GitHub Actions exécute automatiquement du code à chaque événement sur ton repo
# (push, pull request, etc.). C'est comme un ordinateur distant (Ubuntu) qui :
#   1. Clone ton repo
#   2. Installe Python + tes dépendances
#   3. Lance tes tests, ton linter, etc.
#   4. Te dit si tout est vert ou rouge
#
# STRUCTURE D'UN WORKFLOW :
#   - name:        Nom affiché dans l'onglet "Actions" de GitHub
#   - on:          Quand est-ce que ça se déclenche (push, pull_request...)
#   - jobs:        Les tâches à exécuter (chaque job tourne sur une machine séparée)
#     - steps:     Les étapes dans un job (exécutées séquentiellement)
#
# OÙ VOIR LES RÉSULTATS ?
#   → GitHub → ton repo → onglet "Actions" → tu verras chaque exécution
#   → Un ✅ vert = tout a passé, un ❌ rouge = quelque chose a échoué
#
# =============================================================================

name: ELT Pipeline CI

# QUAND déclencher le workflow ?
on:
  push:
    branches: [main, master]      # à chaque push sur main ou master
  pull_request:
    branches: [main, master]      # à chaque pull request vers main ou master

jobs:
  test:
    # Sur quelle machine tourner ? (Ubuntu = Linux gratuit fourni par GitHub)
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # Étape 1 : Récupérer le code du repo
      # -----------------------------------------------------------------------
      # "uses" = utiliser une action pré-faite par GitHub
      # actions/checkout@v4 = clone ton repo sur la machine distante
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Étape 2 : Installer Python
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # -----------------------------------------------------------------------
      # Étape 3 : Installer les dépendances
      # -----------------------------------------------------------------------
      # "run" = exécuter des commandes shell (comme dans ton terminal)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

